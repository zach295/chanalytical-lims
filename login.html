<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
  <meta name="theme-color" content="#003A5C"/>
  <title>Chanalytical — Sign In</title>
  <meta name="google" content="notranslate">
  <meta http-equiv="Cache-Control" content="no-cache">
  <style>
    :root{--navy:#003A5C;--teal:#00869B;--water:#C8E8F0;--white:#fff;--off:#F5F9FA;--slate:#4A6572;--text:#1a2a32;--border:#CBD8DE;--error:#C0392B;--fd:Georgia,serif;--fb:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:var(--fb);background:linear-gradient(155deg,var(--navy) 0%,#005a7a 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
    .wrap{width:100%;max-width:420px;}
    .logo{text-align:center;margin-bottom:28px;}
    .logo-name{font-family:var(--fd);font-size:26px;color:var(--white);display:block;}
    .logo-sub{font-size:12px;color:var(--water);letter-spacing:.1em;text-transform:uppercase;margin-top:4px;display:block;}
    .card{background:var(--white);border-radius:14px;padding:32px 28px;box-shadow:0 8px 32px rgba(0,0,0,0.2);}
    .tabs{display:flex;background:var(--off);border-radius:8px;padding:4px;margin-bottom:24px;}
    .tab{flex:1;padding:10px;text-align:center;font-size:14px;font-weight:600;border:none;background:none;border-radius:6px;cursor:pointer;color:var(--slate);font-family:var(--fb);transition:all .15s;}
    .tab.active{background:var(--white);color:var(--navy);box-shadow:0 1px 4px rgba(0,0,0,.1);}
    .field{margin-bottom:16px;}
    label{display:block;font-size:12px;font-weight:600;color:var(--slate);margin-bottom:6px;}
    input{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:16px;font-family:var(--fb);color:var(--text);-webkit-appearance:none;transition:border .15s,box-shadow .15s;}
    input:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px rgba(0,134,155,.12);}
    .row2{display:flex;gap:10px;}
    .row2 .field{flex:1;}
    .hint{font-size:11px;color:var(--slate);margin-top:4px;line-height:1.4;}
    .btn{width:100%;padding:14px;background:var(--teal);color:var(--white);border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;font-family:var(--fb);margin-top:8px;transition:background .2s;}
    .btn:hover{background:#007a8e;}
    .err{background:#fdf0ee;border:1px solid #f0c0b0;border-radius:8px;padding:10px 14px;font-size:13px;color:var(--error);margin-bottom:16px;display:none;}
    .err.show{display:block;}
  </style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <span class="logo-name">Chanalytical Laboratories</span>
    <span class="logo-sub">Sample Intake System · Gorham, ME</span>
  </div>
  <div class="card">
    <div class="tabs">
      <button class="tab active" onclick="showTab('login',this)">Sign In</button>
      <button class="tab" onclick="showTab('register',this)">Create Account</button>
    </div>

    <div id="login-form">
      <div class="err" id="login-err"></div>
      <div class="field"><label>Email Address</label><input type="text" id="l-email" placeholder="you@example.com" autocomplete="off" inputmode="email" spellcheck="false"/></div>
      <div class="field"><label>Password</label><input type="password" id="l-pw" placeholder="Your password" autocomplete="off" onkeydown="if(event.key==='Enter')doLogin()"/></div>
      <button class="btn" id="login-panel" onclick="doLogin()">Sign In →</button>
    </div>

    <div id="reset-form" style="display:none;">
      <div style="margin-bottom:16px;">
        <div style="font-size:18px;font-weight:700;color:var(--navy);">Set Your Password</div>
        <div style="font-size:13px;color:#666;margin-top:4px;">Your account was set up by an admin. Please create your own password to continue.</div>
      </div>
      <div class="err" id="reset-err"></div>
      <div class="field"><label>New Password</label><input type="password" id="reset-pw" placeholder="Minimum 6 characters" autocomplete="off"/></div>
      <div class="field"><label>Confirm Password</label><input type="password" id="reset-confirm" placeholder="Repeat password" autocomplete="off" onkeydown="if(event.key==='Enter')doSetPassword()"/></div>
      <button class="btn" id="reset-btn" onclick="doSetPassword()">Save Password & Sign In →</button>
    </div>


    <div id="register-form" style="display:none;">
      <div class="err" id="reg-err"></div>
      <div class="row2">
        <div class="field"><label>First Name</label><input type="text" id="r-first" placeholder="First name" autocomplete="off"/></div>
        <div class="field"><label>Last Name</label><input type="text" id="r-last" placeholder="Last name" autocomplete="off"/></div>
      </div>
      <div class="field"><label>Email Address</label><input type="text" id="r-email" placeholder="you@example.com" autocomplete="off" inputmode="email" spellcheck="false"/></div>
      <div class="field"><label>Password</label><input type="password" id="r-pw" placeholder="Minimum 6 characters" autocomplete="off"/></div>
      <div class="field"><label>Confirm Password</label><input type="password" id="r-confirm" placeholder="Repeat password" autocomplete="off" onkeydown="if(event.key==='Enter')doRegister()"/></div>
      <div class="field">
        <label>Registration Code <span style="font-weight:400">(optional)</span></label>
        <input type="text" id="r-code" placeholder="Enter code if provided by the lab" style="text-transform:uppercase;letter-spacing:.05em;"/>
        <div class="hint">Business clients: use your company code. Public users: leave blank.</div>
      </div>
      <button class="btn" onclick="doRegister()">Create Account →</button>
    </div>
  </div>
</div>
<script src="auth.js"></script>
<script>
  const _s = Auth.getSession();
  if (_s) redirect(_s.role);

  function showPanel(panel) {
    document.getElementById('login-form').style.display   = panel === 'login'   ? 'block' : 'none';
    document.getElementById('register-form').style.display= panel === 'register'? 'block' : 'none';
    document.getElementById('reset-form').style.display   = panel === 'reset'   ? 'block' : 'none';
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  }


  async function doSetPassword() {
    const email = sessionStorage.getItem('cha_reset_email');
    const pw = document.getElementById('reset-pw').value;
    const confirm = document.getElementById('reset-confirm').value;
    const errEl = document.getElementById('reset-err');
    const btn = document.getElementById('reset-btn');
    if (!pw || pw.length < 6) { showErr(errEl, 'Password must be at least 6 characters.'); return; }
    if (pw !== confirm) { showErr(errEl, 'Passwords do not match.'); return; }
    btn.textContent = 'Saving...'; btn.disabled = true;
    try {
      const res = await fetch('/.netlify/functions/users-manage', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'setpw', email, newPassword: pw }),
      });
      const data = await res.json();
      if (!data.success) throw new Error(data.error);

      // Save the new password to localStorage so future logins work offline too
      const user = data.user;
      const users = Auth.getUsers();
      const key = email.toLowerCase().trim();
      users[key] = {
        email: key,
        name:  user.name  || key.split('@')[0],
        role:  user.role  || 'lab',
        clientKey: user.clientKey || '',
        password: Auth.hashPassword(pw),
        fromServer: true,
        createdAt: new Date().toISOString(),
      };
      Auth.saveUsers(users);
      Auth.createSession(users[key]);
      redirect(users[key].role);

    } catch(e) {
      showErr(errEl, e.message || 'Failed to save password. Please try again.');
      btn.textContent = 'Save Password & Sign In →'; btn.disabled = false;
    }
  }

  function showTab(tab, btn) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
    document.getElementById('register-form').style.display = tab === 'register' ? 'block' : 'none';
  }

  async function doLogin() {
    const email = document.getElementById('l-email').value;
    const pw = document.getElementById('l-pw').value;
    const errEl = document.getElementById('login-err');
    const btn = document.getElementById('login-panel');
    if (!email || !pw) { showErr(errEl, 'Please enter your email and password.'); return; }
    btn.textContent = 'Signing in...'; btn.disabled = true;
    const r = await Auth.loginAsync(email, pw);
    btn.textContent = 'Sign In →'; btn.disabled = false;
    if (!r.success) { showErr(errEl, r.error); return; }
    if (r.mustReset) {
      // Admin-set account — must create new password before proceeding
      sessionStorage.setItem('cha_reset_email', email);
      showPanel('reset');
    } else {
      redirect(r.user.role);
    }
  }

  function doRegister() {
    const first = document.getElementById('r-first').value.trim();
    const last = document.getElementById('r-last').value.trim();
    const email = document.getElementById('r-email').value;
    const pw = document.getElementById('r-pw').value;
    const confirm = document.getElementById('r-confirm').value;
    const code = document.getElementById('r-code').value;
    const errEl = document.getElementById('reg-err');
    if (!first || !last) { showErr(errEl, 'Please enter your first and last name.'); return; }
    if (!email || !pw) { showErr(errEl, 'Please fill in all required fields.'); return; }
    if (pw !== confirm) { showErr(errEl, 'Passwords do not match.'); return; }
    const r = Auth.register(email, pw, code, `${first} ${last}`);
    if (!r.success) showErr(errEl, r.error);
    else redirect(r.user.role);
  }

  function redirect(role) {
    if (role === 'admin') { sessionStorage.setItem('cha_admin_alive','1'); window.location.href='/admin-dashboard.html'; }
    else if (role === 'lab' || role === 'office') window.location.href='/admin-dashboard.html';
    else window.location.href='/dashboard.html';
  }

  function showErr(el, msg) { el.textContent = msg; el.classList.add('show'); }
</script>
</body>
</html>
